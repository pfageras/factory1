<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnSite — Sikkerhetshull</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Nylige sikkerhetshull</h1>
    <div class="meta">
        <span id="total-count"></span>
        &middot;
        <span id="last-updated">Laster...</span>
    </div>

    <nav class="filter-tabs">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="supply_chain">Supply chain</button>
        <button class="filter-btn" data-filter="malware">Malware</button>
    </nav>

    <div id="loading" class="loading">Henter data...</div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Beskrivelse</th>
                <th>Pakker</th>
                <th>CVSS</th>
                <th>Alvorlighet</th>
                <th>Sist endret</th>
            </tr>
        </thead>
        <tbody id="cve-body"></tbody>
    </table>

    <script src="/app.js"></script>
</body>
</html>
